version: '3.8'
services:
  mysql:
    image: mysql:8.4
    container_name: papertrail-mysql
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: papertrail_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data:
